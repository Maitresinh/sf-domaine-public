services:
  mariadb-sfdb:
    image: mariadb:11
    container_name: mariadb-sfdb
    environment:
      MYSQL_ROOT_PASSWORD: isfdb
      MYSQL_DATABASE: isfdb
    ports:
      - "3307:3306"
    volumes:
      - /mnt/user/sf-dp/data:/var/lib/mysql
    restart: unless-stopped

  datasette:
    image: datasetteproject/datasette
    container_name: sf-dp-datasette
    ports:
      - "8001:8001"
    volumes:
      - /mnt/user/sf-dp/data:/data
    command: >
      datasette serve /data/sf_dp.sqlite
      --host 0.0.0.0
      --port 8001
      --setting sql_time_limit_ms 10000
      --setting max_returned_rows 5000
    restart: unless-stopped

  streamlit:
    image: python:3.12-slim
    container_name: sf-dp-streamlit
    ports:
      - "8501:8501"
    volumes:
      - /mnt/user/sf-dp:/app
    working_dir: /app
    command: bash -c "pip install -q streamlit pandas && streamlit run 8_app.py --server.port 8501 --server.address 0.0.0.0"
    restart: unless-stopped
